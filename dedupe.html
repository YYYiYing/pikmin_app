<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重複美片清理工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
    <style>
        body { background-color: #111827; color: #d1d5db; font-family: 'Inter', sans-serif; padding-bottom: 40px; }
        
        /* 優化後的卡片群組 */
        .card-group { 
            background-color: #1f2937; 
            border: 1px solid #374151; 
            border-radius: 0.75rem; 
            overflow: hidden; 
            margin-bottom: 1.5rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* 群組標題：手機版垂直排列，平板以上水平排列 */
        .card-header { 
            background-color: #374151; 
            padding: 0.75rem 1rem; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            gap: 0.5rem;
        }
        @media (min-width: 768px) {
            .card-header { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        /* 單一卡片項目 */
        .card-item { 
            display: flex; 
            gap: 0.75rem; 
            padding: 1rem; 
            border-bottom: 1px solid #374151; 
            align-items: flex-start; /* 頂對齊，讓長內容更好看 */
            position: relative;
        }
        .card-item:last-child { border-bottom: none; }

        /* 標籤樣式 */
        .tag { 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            white-space: nowrap;
            display: inline-block;
        }
        .tag-lib { background-color: #db2777; color: white; }
        .tag-gal { background-color: #7c3aed; color: white; }

        /* 分頁按鈕優化 */
        .tab-btn { 
            flex: 1; 
            text-align: center; 
            padding: 0.75rem 0.5rem; 
            cursor: pointer; 
            border-bottom: 2px solid transparent; 
            transition: all 0.3s; 
            font-size: 0.9rem;
            color: #9ca3af;
        }
        .tab-btn.active { 
            color: #60a5fa; 
            border-bottom-color: #60a5fa; 
            font-weight: bold; 
            background-color: rgba(31, 41, 55, 0.5);
        }

        .modal-backdrop { background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(4px); }

        /* 修改 .card-group 讓它在列表模式下更緊湊 */
        .card-group {
            background-color: #1f2937; /* Gray-800 */
            border: 1px solid #374151;
            border-radius: 0.75rem;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* 列表項目的新樣式 */
        .list-row {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #374151;
            background-color: #1f2937; /* 與背景同色，減少框線感 */
            transition: background-color 0.2s;
        }
        .list-row:last-child {
            border-bottom: none;
        }
        .list-row:hover {
            background-color: #2d3748; /* Gray-750 hover */
        }
    </style>
</head>
<body class="px-4">

                </h1>
                <span class="text-xs text-gray-500 md:hidden">重複美片管理</span>

            <div id="tab-exact" class="tab-btn active" onclick="switchTab('exact')">

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
                            </svg>
                            更換圖片
                        </button>
                        <p class="text-[10px] text-gray-500 mt-1">* 上傳後系統將自動替換並清理舊檔。</p>

                <div class="grid grid-cols-3 gap-2">

                    <div><label class="block text-xs text-gray-400 mb-1">地區</label><input type="text" id="edit-region" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-2 text-sm"></div>
                    <div><label class="block text-xs text-gray-400 mb-1">細項</label><input type="text" id="edit-area" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-2 text-sm"></div>
                </div>

                        <input type="text" id="edit-tag-1" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-2 text-sm text-center">
                        <input type="text" id="edit-tag-2" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-2 text-sm text-center">
                        <input type="text" id="edit-tag-3" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-2 text-sm text-center">
                    </div>

                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-700">
                    <button type="button" onclick="closeEditModal()" class="px-4 py-2 bg-gray-600 text-gray-200 rounded-lg hover:bg-gray-500 transition font-bold text-sm">取消</button>
                    <button type="submit" id="save-btn" class="px-6 py-2 bg-pink-600 text-white rounded-lg hover:bg-pink-700 transition font-bold text-sm shadow-lg">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://htdddmoclmhqebyvzean.supabase.co';
        const PUBLIC_KEY = 'sb_publishable_95x4eVN3GHlRFfnJQHaXpg_csrMp2fJ'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, PUBLIC_KEY);

        let currentTabData = { exact: [], fuzzy: [] };
        let activeTab = 'exact';

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { alert('請先登入管理員帳號'); window.location.href = './index.html'; return; }

            document.getElementById('status-bar').textContent = '正在掃描重複資料...';
            try {
                await scanLocalDuplicates();
            } catch (err) {
                document.getElementById('status-bar').innerHTML = `<span class="text-red-500">錯誤: ${err.message}</span>`;
            }
        }

        const getCoordKey = (coord, precision = 6) => {
            if (!coord) return 'unknown';
            const parts = coord.split(',').map(s => {
                const num = parseFloat(s.trim());
                return isNaN(num) ? 0 : num.toFixed(precision);
            });
            return parts.join(',');
        };

        // 產生群組指紋：依 source+id 排序 → JSON → 數值雜湊
        function generateGroupSignature(items) {
            const sorted = [...items].sort((a, b) => {
                const aKey = `${a.source}_${a.id}`;
                const bKey = `${b.source}_${b.id}`;
                return aKey.localeCompare(bKey);
            });
            const json = JSON.stringify(sorted.map(i => ({ source: i.source, id: i.id })));
            let hash = 0;
            for (let i = 0; i < json.length; i++) {
                const char = json.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return `sig_${Math.abs(hash).toString(36)}`;
        }

        // 計算兩點座標距離 (單位: 公尺)
        function calculateDistance(coord1, coord2) {
            if (!coord1 || !coord2) return Infinity;
            const [lat1, lon1] = coord1.split(',').map(n => parseFloat(n));
            const [lat2, lon2] = coord2.split(',').map(n => parseFloat(n));
            
            const R = 6371e3; // 地球半徑 (公尺)
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c; // 回傳距離 (公尺)
        }

        async function scanLocalDuplicates() {
            // 1. 抓取資料
            const [libRes, galRes] = await Promise.all([
                supabaseClient.from('postcards').select('*'),
                supabaseClient.from('guest_postcards').select('*')
            ]);

            const libraryItems = libRes.data || [];
            const galleryItems = galRes.data || [];

            const allItems = [
                ...libraryItems.map(i => ({...i, source: 'library', name: i.uploader_nickname, label: '圖書館'})),
                ...galleryItems.map(i => ({...i, source: 'gallery', name: i.nickname, label: '藝廊'}))
            ];
            
            // 2. 篩選：排除「系統轉移 (system_import)」且「圖書館已有原始檔」的合法共用資料
            const filteredItems = allItems.filter(item => {
                if (item.source === 'gallery' && item.ip_fingerprint === 'system_import') {
                    // 檢查圖書館是否已存在「完全相同座標」的原始檔
                    const existsInLib = libraryItems.some(lib => 
                        getCoordKey(lib.coordinate, 6) === getCoordKey(item.coordinate, 6)
                    );
                    // 如果圖書館有原始檔，予以隱藏
                    if (existsInLib) return false; 
                }
                return true; 
            });

            // 3. 處理完全重複 (邏輯維持不變)
            const exactGroups = new Map();
            filteredItems.forEach(item => {
                const eKey = getCoordKey(item.coordinate, 6);
                if (!exactGroups.has(eKey)) exactGroups.set(eKey, []);
                exactGroups.get(eKey).push(item);
            });

            // 4. 處理鄰近偵測 (更新：改為距離演算法 1100m)
            const fuzzyResults = [];
            const visitedIds = new Set(); // 記錄已分組的項目 (避免重複列入)
            const DISTANCE_LIMIT = 1200;  // 設定判定距離為 1200 公尺

            // 複製一份陣列來進行比對
            const pool = [...filteredItems];

            for (let i = 0; i < pool.length; i++) {
                const baseItem = pool[i];
                // 產生唯一 ID key (source + id) 以防不同資料表 ID 重複
                const baseIdKey = `${baseItem.source}_${baseItem.id}`;

                if (visitedIds.has(baseIdKey)) continue; // 若已分組過則跳過

                // 建立新群組，以 baseItem 為中心
                const group = [baseItem];
                visitedIds.add(baseIdKey);

                // 往後尋找所有距離 1200m 內的點
                for (let j = i + 1; j < pool.length; j++) {
                    const candidate = pool[j];
                    const candidateIdKey = `${candidate.source}_${candidate.id}`;

                    if (visitedIds.has(candidateIdKey)) continue;

                    // 使用您第一步驟加入的 calculateDistance 函式
                    const dist = calculateDistance(baseItem.coordinate, candidate.coordinate);
                    
                    if (dist <= DISTANCE_LIMIT) {
                        group.push(candidate);
                        visitedIds.add(candidateIdKey);
                    }
                }

                // 只有當群組內有 2 筆以上資料時才算重複群組
                if (group.length > 1) {
                    const centerCoord = getCoordKey(baseItem.coordinate, 4);
                    fuzzyResults.push({
                        key: `鄰近群組 (~${centerCoord})`, // 群組標題
                        items: group
                    });
                }
            }

            // 5. 載入 PASS 記錄並註記群組
            let passes = [];
            try {
                const { data: passData } = await supabaseClient.from('fuzzy_review_passes').select('*');
                passes = passData || [];
            } catch (e) {
                console.warn('無法讀取 PASS 記錄（可能是 RLS 尚未設定）:', e);
            }

            const reopenedIds = [];
            currentTabData.fuzzy = fuzzyResults.map(group => {
                const sig = generateGroupSignature(group.items);
                const pass = passes.find(p => p.signature === sig);

                if (!pass) return { ...group, _passStatus: 'new' };

                const currentIds = new Set(group.items.map(i => `${i.source}_${i.id}`));
                const passedIds = new Set(pass.items.map(i => `${i.source}_${i.id}`));
                const hasNew = [...currentIds].some(id => !passedIds.has(id));

                if (hasNew) {
                    reopenedIds.push(pass.id);
                    return { ...group, _passStatus: 'reopened', _passId: pass.id };
                }

                return { ...group, _passStatus: 'passed', _passId: pass.id };
            });

            // 背景刪除 reopened 的舊 PASS 記錄
            if (reopenedIds.length > 0) {
                Promise.all(reopenedIds.map(id =>
                    supabaseClient.functions.invoke('admin-actions', {
                        body: JSON.stringify({ action: 'delete-fuzzy-pass', payload: { passId: id } })
                    })
                )).catch(e => console.error('清除舊 PASS 記錄失敗:', e));
            }

            // 6. 更新介面數字與內容
            document.getElementById('count-exact').textContent = currentTabData.exact.length;
            document.getElementById('count-fuzzy').textContent = currentTabData.fuzzy.filter(g => g._passStatus !== 'passed').length;
            document.getElementById('count-fuzzy-passed').textContent = currentTabData.fuzzy.filter(g => g._passStatus === 'passed').length;
            document.getElementById('status-bar').textContent = ''; 
            
            renderActiveTab();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tab-exact').className = `tab-btn ${tab === 'exact' ? 'active' : ''}`;
            document.getElementById('tab-fuzzy').className = `tab-btn ${tab === 'fuzzy' ? 'active' : ''}`;
            renderActiveTab();
        }

        function renderActiveTab() {
            const container = document.getElementById('list-container');
            const data = currentTabData[activeTab];
            container.innerHTML = '';

            // 過濾邏輯：fuzzy 分頁且 toggle 關閉時隱藏已通過群組
            const showPassed = document.getElementById('toggle-show-passed').checked;
            let filteredData = data;
            if (activeTab === 'fuzzy' && !showPassed) {
                filteredData = data.filter(g => g._passStatus !== 'passed');
            }

            if (filteredData.length === 0) {
                let msg = '沒有發現此類型的重複資料。';
                if (activeTab === 'fuzzy' && data.length > 0 && !showPassed) {
                    msg = `所有 ${data.length} 個群組已標記 PASS，開啟「顯示已通過」可查看。`;
                }
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-24 px-4 text-center border-2 border-dashed border-gray-700 rounded-xl bg-gray-800/50">
                        <div class="text-4xl mb-4 opacity-80">🎉</div>
                        <h3 class="text-xl font-bold text-gray-300 mb-2">乾淨溜溜！</h3>
                        <p class="text-gray-500">${msg}</p>
                    </div>`;
                return;
            }

            filteredData.forEach(group => {
                const groupEl = document.createElement('div');
                groupEl.className = 'card-group';

                // 群組 CSS 樣式依狀態不同
                const isPassed = group._passStatus === 'passed';
                const isReopened = group._passStatus === 'reopened';
                const headerBg = isPassed ? 'bg-gray-800/60' : isReopened ? 'bg-yellow-900/30' : 'bg-gray-900/80';
                const borderStyle = isReopened ? 'border border-yellow-600/40' : '';

                let htmlContent = `
                    <div class="card-header ${headerBg} p-3 flex flex-wrap md:flex-nowrap justify-between items-center gap-3 border-b border-gray-700 ${borderStyle}">
                        <div class="flex items-center gap-3 overflow-hidden min-w-0 flex-1">
                            <span class="flex items-center justify-center w-6 h-6 rounded-full bg-red-500/10 text-red-400 text-sm flex-shrink-0">📍</span>
                            ${isReopened ? '<span class="text-yellow-400 text-xs font-bold flex-shrink-0">🔄</span>' : ''}
                            <h2 class="font-mono text-sm md:text-base ${isPassed ? 'text-gray-500' : 'text-gray-200'} truncate font-bold tracking-wide select-all" title="${group.key}">
                                ${group.key}
                            </h2>
                            ${isReopened ? '<span class="bg-yellow-600/20 text-yellow-400 border border-yellow-600/40 text-[10px] px-1.5 py-0.5 rounded-full font-bold flex-shrink-0">有新項目</span>' : ''}
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <span class="text-xs font-mono bg-gray-800 text-gray-400 px-2 py-1 rounded border border-gray-700 whitespace-nowrap">
                                ${group.items.length} 筆
                            </span>
                            ${isPassed ? '<span class="text-[10px] text-green-500 font-bold bg-green-900/20 px-2 py-0.5 rounded border border-green-700/40">✅ PASS</span>' : ''}
                            ${isReopened ? '<span class="text-[10px] text-yellow-400 font-bold bg-yellow-900/20 px-2 py-0.5 rounded border border-yellow-600/40">需重新審查</span>' : ''}
                            ${activeTab === 'fuzzy' && !isPassed ? `
                            <button onclick="passFuzzyGroup(this, '${group.key.replace(/'/g, "\\'")}')" 
                                class="flex items-center gap-1 text-[11px] bg-green-800/40 hover:bg-green-700/60 text-green-400 border border-green-700/50 px-2.5 py-1 rounded transition font-bold" title="標記為已審查">
                                ✅ PASS
                            </button>` : ''}
                        </div>
                    </div>
                    <div class="flex flex-col">`;

                group.items.sort((a, b) => new Date(a.created_at) - new Date(b.created_at)).forEach((item) => {
                    const isLib = item.source === 'library';
                    const locStr = [item.country, item.region, item.area].filter(Boolean).join(' · ');
                    
                    const dateObj = new Date(item.created_at);
                    const dateStr = dateObj.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });

                    let displayName = (item.name || '未命名').replace(/\d{12}/g, '').trim();
                    if (!displayName) displayName = item.name || '未命名';

                    const badgeClass = isLib ? 'bg-pink-900/30 text-pink-300 border-pink-700/50' : 'bg-violet-900/30 text-violet-300 border-violet-700/50';
                    const badgeText = isLib ? '圖書館' : '藝廊';

                    // 標籤 HTML 生成
                    const tagsHtml = (item.tags || []).map(t => 
                        `<span class="text-[10px] bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded border border-gray-600 whitespace-nowrap">#${t}</span>`
                    ).join('');

                    htmlContent += `
                    <div class="list-row group" id="item-${item.source}-${item.id}">
                        
                        <div class="relative w-20 h-20 md:w-24 md:h-24 shrink-0 cursor-zoom-in overflow-hidden rounded-lg bg-gray-900 border border-gray-700" onclick="viewImage('${item.image_url}')">
                            <img src="${item.image_url}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy">
                            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors"></div>
                        </div>

                        <div class="flex-1 min-w-0 ml-4 flex flex-col md:flex-row md:items-center gap-2 md:gap-6">
                            
                            <div class="flex flex-col md:flex-row md:items-center gap-2 md:w-1/3">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] px-1.5 py-0.5 rounded border ${badgeClass} whitespace-nowrap">${badgeText}</span>
                                    <span class="font-bold text-gray-200 text-sm md:text-base truncate" title="${item.name}">${displayName}</span>
                                </div>
                            </div>

                            <div class="flex flex-col gap-1 md:w-1/2">
                                <div class="flex items-center gap-2 text-xs text-gray-400">
                                    <span class="w-4 text-center opacity-50">📅</span>
                                    <span class="font-mono">${dateStr}</span>
                                </div>

                                <div class="flex items-center gap-2 text-[10px] md:text-xs tracking-tighter md:tracking-normal text-gray-400 font-mono select-all">
                                    <span class="w-4 text-center opacity-50">📍</span>
                                    <span class="truncate text-gray-300">${item.coordinate}</span>
                                </div>

                                ${locStr ? `
                                <div class="flex items-center gap-2 text-xs text-blue-300/80" title="${locStr}">
                                    <span class="w-4 text-center opacity-50">🌍</span>
                                    <span class="truncate">${locStr}</span>
                                </div>` : ''}
                                
                                ${tagsHtml ? `
                                <div class="flex flex-wrap gap-1 mt-0.5 pl-6">
                                    ${tagsHtml}
                                </div>` : ''}
                            </div>
                        </div>

                        <div class="ml-auto pl-2 flex flex-col justify-center gap-2 shrink-0">
                            <button onclick="copyToClipboard('${item.coordinate}', this)" 
                                class="flex items-center justify-center w-9 h-9 md:w-auto md:h-8 md:px-3 bg-gray-800 hover:bg-blue-500/20 text-gray-500 hover:text-blue-400 border border-gray-700 hover:border-blue-500/50 rounded transition-all duration-200" title="複製座標">
                                <span class="text-xs">📋</span>
                            </button>

                            <button onclick="openEditModal('${item.source}', '${item.id}')" 
                                class="flex items-center justify-center w-9 h-9 md:w-auto md:h-8 md:px-3 bg-gray-800 hover:bg-yellow-500/20 text-gray-500 hover:text-yellow-400 border border-gray-700 hover:border-yellow-500/50 rounded transition-all duration-200" title="編輯">
                                <span class="text-xs">✏️</span>
                            </button>

                            <button onclick="deleteItem('${item.source}', '${item.id}', '${item.name.replace(/'/g, "\\'")}', '${item.friend_code || ''}')" 
                                class="flex items-center justify-center w-9 h-9 md:w-auto md:h-8 md:px-3 bg-gray-800 hover:bg-red-500/20 text-gray-500 hover:text-red-400 border border-gray-700 hover:border-red-500/50 rounded transition-all duration-200" title="刪除">
                                <span class="text-xs">🗑️</span>
                            </button>
                        </div>
                    </div>`;
                });

                htmlContent += `</div>`;
                groupEl.innerHTML = htmlContent;
                container.appendChild(groupEl);
            });
        }

        // PASS 鄰近群組
        window.passFuzzyGroup = async (btn, groupKey) => {
            const cardGroup = btn.closest('.card-group');
            const headerEl = btn.closest('.card-header');
            if (!headerEl) return;

            // 從目前的資料中找出這個群組
            const groupIndex = Array.from(headerEl.parentElement.querySelectorAll('.list-row')).map(row => row.id);
            const groupData = currentTabData.fuzzy.find(g => g.key === groupKey);
            if (!groupData) return;

            btn.disabled = true;
            btn.textContent = '儲存中...';

            try {
                const items = groupData.items.map(i => ({
                    source: i.source,
                    id: i.id,
                    coordinate: i.coordinate
                }));
                const signature = generateGroupSignature(groupData.items);

                const { error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({
                        action: 'save-fuzzy-pass',
                        payload: { signature, items, itemCount: items.length }
                    })
                });

                if (error) throw error;

                // 更新本地狀態
                groupData._passStatus = 'passed';
                document.getElementById('count-fuzzy').textContent = currentTabData.fuzzy.filter(g => g._passStatus !== 'passed').length;
                document.getElementById('count-fuzzy-passed').textContent = currentTabData.fuzzy.filter(g => g._passStatus === 'passed').length;

                // 淡出移除
                const showPassed = document.getElementById('toggle-show-passed').checked;
                if (!showPassed) {
                    cardGroup.style.transition = 'all 0.4s ease';
                    cardGroup.style.opacity = '0';
                    cardGroup.style.maxHeight = '0';
                    cardGroup.style.marginBottom = '0';
                    cardGroup.style.overflow = 'hidden';
                    setTimeout(() => {
                        if (cardGroup.parentElement) cardGroup.remove();
                        // 檢查是否全部清空
                        const container = document.getElementById('list-container');
                        if (container.children.length === 0) renderActiveTab();
                    }, 400);
                } else {
                    renderActiveTab();
                }

            } catch (e) {
                console.error(e);
                alert('PASS 儲存失敗: ' + e.message);
                btn.disabled = false;
                btn.innerHTML = '✅ PASS';
            }
        };

        window.togglePassed = (event) => {
            const cb = document.getElementById('toggle-show-passed');
            // 只處理點擊容器空白區域（label 和 checkbox 自帶切換）
            if (event.target === event.currentTarget) {
                cb.checked = !cb.checked;
                renderActiveTab();
            }
        };

        window.deleteItem = async (source, id, nickname, friendCode) => {
            if (!confirm('確定要執行刪除嗎？此操作無法撤銷')) return;
            
            const btn = event.currentTarget; // 使用 currentTarget 確保抓到 button 元素
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin h-4 w-4 border-2 border-red-500 border-t-transparent rounded-full"></span>';
            
            try {
                let action = source === 'library' ? 'delete-postcard' : 'delete-guest-postcard';
                let payload = source === 'library' ? { postcardId: id } : { id: id, nickname, friendCode };

                const { data, error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action, payload })
                });

                if (error) throw error;

                // --- 成功後的 UI 與資料更新邏輯 ---

                // 1. 找到 DOM 元素
                const row = document.getElementById(`item-${source}-${id}`);
                if (!row) return;

                // 2. 更新全域資料變數 (currentTabData)
                // 這是為了確保切換 Tab 時，資料也是最新的
                const groupData = currentTabData[activeTab].find(g => g.items.some(i => i.id == id && i.source == source));
                if (groupData) {
                    groupData.items = groupData.items.filter(i => !(i.id == id && i.source == source));
                }

                // 3. UI 動畫：移除該項目
                row.style.transition = 'all 0.3s ease-out';
                row.style.opacity = '0';
                row.style.transform = 'translateX(20px)';

                setTimeout(() => {
                    const listWrapper = row.parentElement; // .flex-col 容器
                    const cardGroup = listWrapper.parentElement; // .card-group 容器
                    
                    row.remove(); // 移除 DOM

                    // 4. 檢查該群組剩餘數量
                    // listWrapper.children 包含了剩下的 .list-row
                    const remainingCount = listWrapper.children.length;

                    if (remainingCount < 2) {
                        // 如果剩餘數量小於 2 (只剩 1 個或 0 個)，代表不再是「重複群組」
                        // 將整個群組卡片移除
                        cardGroup.style.transition = 'all 0.5s ease';
                        cardGroup.style.opacity = '0';
                        cardGroup.style.maxHeight = '0';
                        cardGroup.style.marginBottom = '0';
                        
                        setTimeout(() => cardGroup.remove(), 500);

                        // 從全域資料中移除該群組 (因為它不再算是一組重複資料)
                        if (groupData) {
                            currentTabData[activeTab] = currentTabData[activeTab].filter(g => g !== groupData);
                        }
                    } else {
                        // 如果群組還存在，更新群組標題上的 "N 筆"
                        const countBadge = cardGroup.querySelector('.card-header span:last-child');
                        if (countBadge) countBadge.textContent = `${remainingCount} 筆`;
                    }
                    
                    document.getElementById(`count-${activeTab}`).textContent = currentTabData[activeTab].length;
                    if (activeTab === 'fuzzy') {
                        document.getElementById('count-fuzzy').textContent = currentTabData.fuzzy.filter(g => g._passStatus !== 'passed').length;
                        document.getElementById('count-fuzzy-passed').textContent = currentTabData.fuzzy.filter(g => g._passStatus === 'passed').length;
                    }

                }, 300);

            } catch (e) {
                console.error(e);
                alert(`刪除失敗: ${e.message}`);
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    <span class="hidden md:inline text-xs font-medium">刪除</span>`;
            }
        };

        // 點擊複製座標功能
        window.copyToClipboard = (text, el) => {
            // 防止事件冒泡 (雖然目前外層沒有點擊事件，但保持好習慣)
            event.stopPropagation();

            navigator.clipboard.writeText(text).then(() => {
                // 視覺回饋：暫時顯示 "已複製"
                const originalContent = el.innerHTML;
                // 鎖定寬度避免跳動 (選用)
                const width = el.offsetWidth;
                
                el.innerHTML = `
                    <span class="w-4 text-center text-green-400">✓</span>
                    <span class="text-green-400 font-bold">已複製!</span>
                `;
                
                setTimeout(() => {
                    el.innerHTML = originalContent;
                }, 1000);
            }).catch(err => {
                console.error('複製失敗:', err);
                alert('複製失敗，請手動複製');
            });
        };

        window.viewImage = (url) => { document.getElementById('viewer-image').src = url; document.getElementById('image-viewer-modal').classList.remove('hidden'); };
        window.closeImageViewer = () => { document.getElementById('image-viewer-modal').classList.add('hidden'); };
        document.addEventListener('DOMContentLoaded', init);

        // --- 編輯功能相關函式 ---
        // --- 編輯功能與圖片處理 ---

        // 1. 開啟編輯視窗
        window.openEditModal = (source, id) => {
            let targetItem = null;
            // 搜尋目前顯示的資料
            for (const group of currentTabData[activeTab]) {
                const found = group.items.find(i => i.source === source && i.id == id);
                if (found) { targetItem = found; break; }
            }
            if (!targetItem) return alert('找不到資料');

            // 填入資料
            document.getElementById('edit-source').value = source;
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-coord').value = targetItem.coordinate || '';
            document.getElementById('edit-country').value = targetItem.country || '';
            document.getElementById('edit-region').value = targetItem.region || '';
            document.getElementById('edit-area').value = targetItem.area || '';
            
            // 藝廊需要的驗證欄位
            if (source === 'gallery') {
                document.getElementById('edit-nickname').value = targetItem.name; 
                document.getElementById('edit-friendcode').value = targetItem.friend_code;
            }

            const tags = targetItem.tags || [];
            [1,2,3].forEach((n, i) => document.getElementById(`edit-tag-${n}`).value = tags[i] || '');

            // 圖片重置
            document.getElementById('edit-image-preview').src = targetItem.image_url;
            document.getElementById('edit-image-filename').textContent = '尚未選擇新圖片 (保留原圖)';
            document.getElementById('edit-image-filename').className = 'text-xs text-gray-400 mb-2 break-all truncate';
            document.getElementById('edit-image-upload').value = '';

            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeEditModal = () => document.getElementById('edit-modal').classList.add('hidden');

        // 2. 圖片預覽 (只是預覽，不影響資料庫)
        window.handleImagePreview = (event) => {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('edit-image-preview').src = URL.createObjectURL(file);
                const nameEl = document.getElementById('edit-image-filename');
                nameEl.textContent = `準備上傳: ${file.name}`;
                nameEl.className = 'text-xs text-blue-400 font-bold mb-2 break-all truncate';
            }
        };

        // 3. 送出表單 (上傳新圖 -> 呼叫後端 API)
        window.handleEditSubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const originalText = btn.textContent;
            btn.disabled = true; btn.textContent = '處理中...';

            const source = document.getElementById('edit-source').value;
            const id = document.getElementById('edit-id').value;
            const fileInput = document.getElementById('edit-image-upload');

            try {
                let newImageUrl = null;

                // [Step 1] 如果有選新圖，先壓縮並上傳
                if (fileInput.files.length > 0) {
                    btn.textContent = '上傳圖片...';
                    const compressedFile = await compressImage(fileInput.files[0]);
                    
                    // 根據來源決定 Bucket (參考您的後端邏輯)
                    const bucket = source === 'library' ? 'postcard-images' : 'guest-postcard-images';
                    newImageUrl = await uploadImageToStorage(bucket, compressedFile);
                }

                // [Step 2] 呼叫後端 API
                btn.textContent = '儲存資料...';
                
                const payload = {
                    coordinate: document.getElementById('edit-coord').value,
                    country: document.getElementById('edit-country').value,
                    region: document.getElementById('edit-region').value,
                    area: document.getElementById('edit-area').value,
                    tags: [1,2,3].map(i => document.getElementById(`edit-tag-${i}`).value.trim()).filter(Boolean)
                };

                // 若有新圖才放入 payload，後端 index.ts 會自動偵測並刪除舊圖
                if (newImageUrl) payload.imageUrl = newImageUrl; // 注意參數名稱統一為 imageUrl

                let action = '';
                let bodyPayload = {};

                if (source === 'library') {
                    action = 'edit-postcard';
                    bodyPayload = { ...payload, postcardId: id };
                } else {
                    action = 'edit-guest-postcard';
                    bodyPayload = { 
                        ...payload, 
                        id: id,
                        nickname: document.getElementById('edit-nickname').value,
                        friendCode: document.getElementById('edit-friendcode').value
                    };
                }

                const { data, error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action, payload: bodyPayload })
                });

                if (error) throw error;
                if (data && data.success === false) throw new Error(data.message);

                // [Step 3] 更新成功，手動更新本地列表顯示
                if (newImageUrl) payload.image_url = newImageUrl; // 轉為小寫 key 更新本地快取
                updateLocalData(source, id, payload);

                alert('更新成功！');
                closeEditModal();
                renderActiveTab(); // 重繪介面

            } catch (err) {
                console.error(err);
                alert(`失敗: ${err.message}`);
            } finally {
                btn.disabled = false; btn.textContent = originalText;
            }
        };

        // 輔助：更新本地資料 (避免重新整理)
        function updateLocalData(source, id, newProps) {
            const updateList = (list) => {
                list.forEach(g => {
                    const item = g.items.find(i => i.source === source && i.id == id);
                    if (item) {
                        item.coordinate = newProps.coordinate;
                        item.country = newProps.country;
                        item.region = newProps.region;
                        item.area = newProps.area;
                        item.tags = newProps.tags;
                        if (newProps.image_url) item.image_url = newProps.image_url;
                    }
                });
            };
            updateList(currentTabData.exact);
            updateList(currentTabData.fuzzy);
        }

        // 輔助：上傳圖片到 Storage
        async function uploadImageToStorage(bucket, file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            const { error } = await supabaseClient.storage.from(bucket).upload(fileName, file);
            if (error) throw error;
            const { data } = supabaseClient.storage.from(bucket).getPublicUrl(fileName);
            return data.publicUrl;
        }

        // 輔助：圖片壓縮 (標準設定)
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                new Compressor(file, {
                    quality: 0.6, maxWidth: 1600, maxHeight: 1600, mimeType: 'image/jpeg',
                    success(result) { resolve(new File([result], file.name, { type: 'image/jpeg' })); },
                    error(err) { reject(err); },
                });
            });
        }

        // 輔助：座標格式化 & 自動反查 (整合版)
        function formatCoordinateString(val) {
            if (!val) return "";
            let str = val.trim();
            let match = str.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) return `${parseFloat(match[1]).toFixed(7)}, ${parseFloat(match[2]).toFixed(7)}`;
            match = str.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) return `${parseFloat(match[1]).toFixed(7)}, ${parseFloat(match[2]).toFixed(7)}`;
            
            // 處理一般座標
            let tempStr = str.replace(/，/g, ',');
            const numbers = tempStr.match(/(-?\d+(\.\d+)?)/g);
            if (numbers && numbers.length >= 2) return `${parseFloat(numbers[0]).toFixed(7)}, ${parseFloat(numbers[1]).toFixed(7)}`;
            return val;
        }

        async function autoFillLocation(lat, lng) {
            const countryIn = document.getElementById('edit-country');
            const regionIn = document.getElementById('edit-region');
            const areaIn = document.getElementById('edit-area');
            
            countryIn.placeholder = '🔍...'; regionIn.placeholder = '🔍...';
            try {
                const { data: resData } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action: 'reverse-geocode', payload: { lat, lng } })
                });
                if (resData?.data?.address) {
                    const addr = resData.data.address;
                    if (addr.country) countryIn.value = addr.country;
                    if (addr.city || addr.county) regionIn.value = (addr.city || addr.county).replace(/臺/g, '台');
                    if (addr.suburb || addr.district) areaIn.value = addr.suburb || addr.district;
                }
            } catch (e) { console.error(e); }
            countryIn.placeholder = ''; regionIn.placeholder = '';
        }

        // 綁定工具事件
        document.getElementById('paste-btn').onclick = async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    const fmt = formatCoordinateString(text);
                    document.getElementById('edit-coord').value = fmt;
                    const parts = fmt.split(',');
                    if (parts.length === 2) await autoFillLocation(parts[0].trim(), parts[1].trim());
                }
            } catch(e) {}
        };
        document.getElementById('edit-coord').addEventListener('blur', function() { this.value = formatCoordinateString(this.value); });
    </script>
</body>
</html>
