    <script>
        const SUPABASE_URL = 'https://htdddmoclmhqebyvzean.supabase.co';
        const PUBLIC_KEY = 'sb_publishable_95x4eVN3GHlRFfnJQHaXpg_csrMp2fJ';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, PUBLIC_KEY);

        // === Cloudflare CDN 設定 (新增這段) ===
        const CDN_HOST = 'https://pikmin-cdn.secretsoulful.workers.dev';

        function getCdnUrl(url) {
            if (!url) return '';
            // 如果網址是原本的 Supabase 連結，就把它換成 CDN 連結
            if (url.includes('htdddmoclmhqebyvzean.supabase.co')) {
                return url.replace('https://htdddmoclmhqebyvzean.supabase.co', CDN_HOST);
            }
            return url;
        }

        // State
        let allCards = [];
        let activeTag = 'all';
        let activeSource = 'all';
        let uniqueCountries = new Set(), uniqueRegions = new Set(), uniqueAreas = new Set();
        let guestNick = localStorage.getItem('guest_nick');
        let guestCode = localStorage.getItem('guest_code');
        let myIpFingerprint = null; 
        let isAdmin = false; //管理員狀態
        let currentUser = null; // 用來存儲已登入的會員資訊

        let currentPage = 1;
        const itemsPerPage = 24; // 每頁顯示 24 張

        // 優化管理員檢查與會員登入狀態
        async function checkAdmin() {
            try {
                // 1. 檢查 Supabase Auth (會員登入)
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                const userDisplay = document.getElementById('user-display');
                
                if (session) {
                    // --- 已登入會員 ---
                    currentUser = session.user;
                    
                    // 查詢 Profile 取得暱稱與角色
                    const { data: profile } = await supabaseClient
                        .from('profiles')
                        .select('nickname, role')
                        .eq('id', session.user.id)
                        .single();
                    
                    // 將查到的暱稱存入 currentUser 物件中，供發布時使用
                    if (profile) {
                        currentUser.nickname = profile.nickname; 
                        currentUser.role = profile.role;
                    }
                    
                    // 設定顯示名稱 (優先使用會員暱稱)
                    const displayName = profile?.nickname || '會員';
                    
                    // 判斷是否為管理員
                    if (profile?.role === '管理者') {
                        isAdmin = true;
                        // 顯示：[管理員] 暱稱
                        userDisplay.innerHTML = `<span class="text-orange-400 font-bold border border-orange-500/50 px-2 py-0.5 rounded mr-2 text-xs">管理員</span><span class="text-gray-300">${displayName}</span>`;
                    } else {
                        // 顯示：[村民] 暱稱
                        userDisplay.innerHTML = `<span class="text-indigo-400 font-bold border border-indigo-500/50 px-2 py-0.5 rounded mr-2 text-xs">村民</span><span class="text-gray-300">${displayName}</span>`;
                    }
                    
                } else {
                    // --- 未登入 (使用訪客資訊) ---
                    // 僅顯示暱稱，不顯示好友碼
                    const displayNick = guestNick || '未登入訪客';
                    
                    // 如果有訪客暱稱，顯示 [訪客] 暱稱
                    if (guestNick) {
                        userDisplay.innerHTML = `<span class="text-gray-500 font-bold border border-gray-600/50 px-2 py-0.5 rounded mr-2 text-xs">訪客</span><span class="text-gray-400">${displayNick}</span>`;
                    } else {
                        userDisplay.textContent = '未登入';
                    }
                }
            } catch (e) { 
                console.error('Auth check failed', e); 
            }
        }

        // 移植自 radar.html 的座標格式化函式
        function formatCoordinateString(val) {
            if (!val) return "";
            let str = val.trim();

            // 1. 嘗試解析 Google Maps 網址 (最優先)
            let match = str.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) return `${parseFloat(match[1]).toFixed(7)}, ${parseFloat(match[2]).toFixed(7)}`;
            
            match = str.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) return `${parseFloat(match[1]).toFixed(7)}, ${parseFloat(match[2]).toFixed(7)}`;
            
            match = str.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
            if (match) return `${parseFloat(match[1]).toFixed(7)}, ${parseFloat(match[2]).toFixed(7)}`;

            // 2. 嘗試解析標準座標
            // 先把全形逗號轉半形
            let tempStr = str.replace(/，/g, ',');
            
            // 判斷是否為度分秒 (DMS)
            const isDMS = tempStr.includes('°') && (tempStr.includes("'") || tempStr.includes('"') || tempStr.includes('’'));
            
            let lat = 0, lng = 0;
            let success = false;

            if (isDMS) {
                // === 處理度分秒 ===
                const numbers = tempStr.match(/(\d+(\.\d+)?)/g);
                const directions = tempStr.match(/[NSEW北南東西]/gi) || [];
                
                if (numbers && numbers.length >= 6) {
                    const d1 = parseFloat(numbers[0]), m1 = parseFloat(numbers[1]), s1 = parseFloat(numbers[2]);
                    const d2 = parseFloat(numbers[3]), m2 = parseFloat(numbers[4]), s2 = parseFloat(numbers[5]);

                    lat = d1 + (m1 / 60) + (s1 / 3600);
                    lng = d2 + (m2 / 60) + (s2 / 3600);

                    const dirStr = directions.join('');
                    if (/[S南]/.test(dirStr)) lat = -lat; 
                    if (/[W西]/.test(dirStr)) lng = -lng;

                    success = true;
                }
            } else {
                // === 處理一般小數格式 ===
                const numbers = tempStr.match(/(-?\d+\.\d+)/g);
                
                if (numbers && numbers.length >= 2) {
                    lat = parseFloat(numbers[0]);
                    lng = parseFloat(numbers[1]);
                    
                    // 範圍檢查 (-90~90, -180~180) 避免把日期誤判為座標
                    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
                        if (/[S南]/.test(tempStr) && lat > 0) lat = -lat;
                        if (/[W西]/.test(tempStr) && lng > 0) lng = -lng;
                        success = true;
                    }
                }
            }

            if (success) {
                return `${lat.toFixed(7)}, ${lng.toFixed(7)}`;
            } else {
                return val; 
            }
        }

        // ★ 工具函式：自動反查地理位置 (呼叫後端)
        async function autoFillLocation(lat, lng) {
            const countryInput = document.getElementById('input-country');
            const regionInput = document.getElementById('input-region');
            const areaInput = document.getElementById('input-area');

            // 1. 顯示載入中狀態
            const originalPlaceholders = {
                country: countryInput.placeholder,
                region: regionInput.placeholder,
                area: areaInput.placeholder
            };
            
            // 清空舊值並顯示搜尋中
            countryInput.value = ''; countryInput.placeholder = '🔍...';
            regionInput.value = ''; regionInput.placeholder = '🔍...';
            areaInput.value = ''; areaInput.placeholder = '🔍...';

            try {
                // 2. 呼叫後端 API
                const { data: resData, error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ 
                        action: 'reverse-geocode', 
                        payload: { lat, lng } 
                    })
                });

                if (error) throw error;
                if (!resData.success) throw new Error(resData.message);

                const data = resData.data;

                // 3. 填入資料
                if (data && data.address) {
                    const addr = data.address;

                    // 國家
                    if (addr.country) countryInput.value = addr.country;

                    // 地區 (自動修正 "臺" 為 "台" 以統一格式)
                    const region = addr.city || addr.county || '';
                    if (region) regionInput.value = region.replace(/臺/g, '台');

                    // 細項 (區/鄉/鎮)
                    const area = addr.suburb || addr.district || addr.town || '';
                    if (area) areaInput.value = area;
                    
                    // 4. 視覺回饋 (閃爍綠框代表成功)
                    [countryInput, regionInput, areaInput].forEach(el => {
                        if(el.value) {
                            el.classList.add('ring-2', 'ring-green-500', 'border-green-500');
                            setTimeout(() => el.classList.remove('ring-2', 'ring-green-500', 'border-green-500'), 1500);
                        }
                    });
                }
            } catch (e) {
                console.error('自動填寫位置失敗:', e);
                // 失敗時恢復原本的 placeholder
                countryInput.placeholder = originalPlaceholders.country;
                regionInput.placeholder = originalPlaceholders.region;
                areaInput.placeholder = originalPlaceholders.area;
            }
        }

        // Helper: Compress Image
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                new Compressor(file, {
                    quality: 0.6, maxWidth: 1600, maxHeight: 1600, mimeType: 'image/jpeg',
                    success(result) { resolve(new File([result], file.name, { type: 'image/jpeg' })); },
                    error(err) { reject(err); },
                });
            });
        }

        //  Init 函式
        async function init() {
            // 優先執行身分檢查 (因為這會決定 user-display 的內容)
            await checkAdmin();

            // 檢查訪客資料 (如果未登入會員，且無訪客資料，才提示)
            if (!currentUser && (!guestNick || !guestCode)) {
                if(confirm('您尚未設定訪客身分，建議前往大廳設定以使用完整功能。')) {
                    window.location.href = './guest.html';
                    return;
                } else {
                    // 未設定身分，禁用發布按鈕
                    const btn = document.getElementById('add-postcard-btn');
                    if(btn) btn.disabled = true;
                }
            }
            
            await loadCards();
            initDropdowns();
        }

        async function loadCards() {
            try {
                const { data, error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action: 'list-guest-postcards' })
                });
                if (error) throw error;
                
                allCards = data.data;
                myIpFingerprint = data.ip_fingerprint; 

                updateFilters();
                renderGrid();
            } catch (e) {
                console.error(e);
                document.getElementById('postcard-grid').innerHTML = '<p class="col-span-full text-center text-red-400">載入失敗</p>';
            }
        }

        function updateFilters() {
            // 1. 統計標籤 (排除絕版品，避免干擾熱門排行)
            const tagCounts = {};
            allCards.forEach(c => {
                if (!c.is_obsolete && c.tags) {
                    c.tags.forEach(t => tagCounts[t] = (tagCounts[t]||0)+1);
                }
            });
            // 依照數量排序
            const sortedTags = Object.keys(tagCounts).sort((a,b) => tagCounts[b] - tagCounts[a]);
            
            const tagContainer = document.getElementById('filter-container');
            tagContainer.innerHTML = ''; // 清空容器

            // 2. 建立「全部顯示」按鈕
            const allBtn = document.createElement('button');
            allBtn.className = `category-tab ${activeTag==='all'?'active':''}`;
            
            // 加入 (${allCards.length}) 顯示總數量，比照美片圖書館
            allBtn.textContent = `全部顯示 (${allCards.length})`;
            
            allBtn.dataset.tag = 'all'; // 加入 data 屬性
            allBtn.onclick = () => setTag('all');
            tagContainer.appendChild(allBtn);

            // 3. 建立「絕版區」按鈕
            const obsoleteBtn = document.createElement('button');
            const isObsoleteActive = activeTag === 'obsolete';
            obsoleteBtn.className = `category-tab ${isObsoleteActive ? 'bg-red-600 text-white border-red-600' : 'text-red-400 border-red-900/50 hover:bg-red-900/30'}`;
            obsoleteBtn.innerHTML = `🚫 絕版區`;
            obsoleteBtn.dataset.tag = 'obsolete'; // 加入 data 屬性
            obsoleteBtn.onclick = () => setTag('obsolete');
            tagContainer.appendChild(obsoleteBtn);

            // 4. 設定顯示數量限制 (統一為 6 個，與美片圖書館一致)
            const DISPLAY_LIMIT = 6;
            const tagsToShow = sortedTags.slice(0, DISPLAY_LIMIT);
            const hiddenTags = sortedTags.slice(DISPLAY_LIMIT);

            // 5. 渲染前 6 個標籤
            tagsToShow.forEach(tag => createTagButton(tag, tagCounts[tag], tagContainer));

            // 6. 如果有更多標籤，建立「收納區」與「更多按鈕」
            if (hiddenTags.length > 0) {
                const hiddenContainer = document.createElement('span');
                hiddenContainer.className = 'hidden flex flex-wrap gap-2 items-center';
                hiddenContainer.id = 'more-tags-container';
                
                // 渲染其餘標籤
                hiddenTags.forEach(tag => createTagButton(tag, tagCounts[tag], hiddenContainer));
                tagContainer.appendChild(hiddenContainer);

                // 建立切換按鈕
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'text-xs text-violet-400 hover:text-violet-300 underline ml-1 font-bold';
                toggleBtn.textContent = `▼ 更多 (${hiddenTags.length})`;
                
                toggleBtn.onclick = () => {
                    const isHidden = hiddenContainer.classList.contains('hidden');
                    if (isHidden) {
                        hiddenContainer.classList.remove('hidden');
                        toggleBtn.textContent = '▲ 收起';
                    } else {
                        hiddenContainer.classList.add('hidden');
                        toggleBtn.textContent = `▼ 更多 (${hiddenTags.length})`;
                    }
                };
                tagContainer.appendChild(toggleBtn);
            }

            // 來源篩選按鈕
            const sourceContainer = document.getElementById('source-filter-container');
            if (sourceContainer) {
                sourceContainer.innerHTML = '';
                const sources = ['all', '巨大花', '蘑菇', '探測器'];
                const sourceLabels = { all: '全部', '巨大花': '🏵️ 巨大花', '蘑菇': '🍄 蘑菇', '探測器': '📡 探測器' };
                sources.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = `category-tab ${activeSource === s ? 'active' : ''}`;
                    btn.dataset.source = s;
                    btn.textContent = sourceLabels[s];
                    btn.onclick = () => setSourceFilter(s);
                    sourceContainer.appendChild(btn);
                });
            }

            // Regions 下拉選單邏輯維持不變
            uniqueCountries = new Set(); uniqueRegions = new Set(); uniqueAreas = new Set();
            allCards.forEach(c => {
                if (!c.is_obsolete) {
                    if(c.country) uniqueCountries.add(c.country);
                    if(c.region) uniqueRegions.add(c.region);
                    if(c.area) uniqueAreas.add(c.area);
                }
            });
            fillSelect('filter-country', uniqueCountries, '全部國家');
            fillSelect('filter-region', uniqueRegions, '全部地區');
            fillSelect('filter-area', uniqueAreas, '全部細項');
            updateInputDropdowns();
        }

        // 輔助函式：建立標籤按鈕
        function createTagButton(tag, count, parent) {
            const btn = document.createElement('button');
            const isActive = activeTag === tag;
            btn.className = `category-tab ${isActive?'active':''}`;
            btn.innerHTML = `#${tag} <span class="text-[10px] opacity-70">(${count})</span>`;
            btn.dataset.tag = tag; // 加入識別屬性
            btn.onclick = () => setTag(tag);
            parent.appendChild(btn);
        }

        // fillSelect 函式中的 onchange 事件
        function fillSelect(id, set, defaultTxt) {
            const el = document.getElementById(id);
            const oldVal = el.value;
            el.innerHTML = `<option value="all">${defaultTxt}</option>`;
            Array.from(set).sort().forEach(v => el.add(new Option(v, v)));
            if(set.has(oldVal)) el.value = oldVal;
            
            // 切換篩選條件時，重置為第一頁
            el.onchange = () => {
                currentPage = 1;
                renderGrid();
            };
        }

        // setTag 函式，加入重置頁碼
        window.setTag = (tag) => {
            activeTag = tag;
            currentPage = 1; // 切換標籤重置頁碼
            
            document.querySelectorAll('.category-tab').forEach(btn => {
                if (btn.dataset.tag === tag) {
                    btn.classList.add('active');
                    if (tag === 'obsolete') btn.className = 'category-tab active bg-red-600 text-white border-red-600';
                } else {
                    btn.classList.remove('active');
                    if (btn.dataset.tag === 'obsolete') btn.className = 'category-tab text-red-400 border-red-900/50 hover:bg-red-900/30';
                }
            });

            renderGrid();
        };

        // selectSource 函式
        window.selectSource = (src) => {
            const input = document.getElementById('input-source');
            if (input) input.value = src;
            
            const giantBtn = document.getElementById('src-giant-btn');
            const mushroomBtn = document.getElementById('src-mushroom-btn');
            const detectorBtn = document.getElementById('src-detector-btn');
            
            if (giantBtn) {
                giantBtn.className = src === '巨大花'
                    ? 'flex-1 px-4 py-2 rounded-lg border bg-violet-600/30 border-violet-500 text-violet-300 text-sm font-bold flex items-center justify-center gap-1 transition'
                    : 'flex-1 px-4 py-2 rounded-lg border border-gray-500 bg-gray-700 hover:bg-rose-900/30 hover:border-rose-500/50 text-gray-400 hover:text-rose-300 text-sm font-bold flex items-center justify-center gap-1 transition';
            }
            if (mushroomBtn) {
                mushroomBtn.className = src === '蘑菇'
                    ? 'flex-1 px-4 py-2 rounded-lg border bg-violet-600/30 border-violet-500 text-violet-300 text-sm font-bold flex items-center justify-center gap-1 transition'
                    : 'flex-1 px-4 py-2 rounded-lg border border-gray-500 bg-gray-700 hover:bg-amber-900/30 hover:border-amber-500/50 text-gray-400 hover:text-amber-300 text-sm font-bold flex items-center justify-center gap-1 transition';
            }
            if (detectorBtn) {
                detectorBtn.className = src === '探測器'
                    ? 'flex-1 px-4 py-2 rounded-lg border bg-cyan-600/30 border-cyan-500 text-cyan-300 text-sm font-bold flex items-center justify-center gap-1 transition'
                    : 'flex-1 px-4 py-2 rounded-lg border border-gray-500 bg-gray-700 hover:bg-cyan-900/30 hover:border-cyan-500/50 text-gray-400 hover:text-cyan-300 text-sm font-bold flex items-center justify-center gap-1 transition';
            }
        };

        // setSourceFilter 函式
        function setSourceFilter(src) {
            activeSource = src;
            currentPage = 1;
            document.querySelectorAll('#source-filter-container button').forEach(btn => {
                if (btn.dataset.source === src) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('postcard-grid');
            const paginationControls = document.getElementById('pagination-controls');
            
            const cVal = document.getElementById('filter-country').value;
            const rVal = document.getElementById('filter-region').value;
            const aVal = document.getElementById('filter-area').value;

            // 1. 執行篩選 (維持原邏輯)
            const filtered = allCards.filter(c => {
                if (activeTag === 'obsolete') return c.is_obsolete === true;
                if (c.is_obsolete === true) return false;
                if (activeTag !== 'all' && (!c.tags || !c.tags.includes(activeTag))) return false;
                if (cVal !== 'all' && c.country !== cVal) return false;
                if (rVal !== 'all' && c.region !== rVal) return false;
                if (aVal !== 'all' && c.area !== aVal) return false;
                if (activeSource !== 'all' && c.source !== activeSource) return false;
                return true;
            });

            if (filtered.length === 0) {
                const msg = activeTag === 'obsolete' ? '目前沒有絕版的美片。' : '沒有符合條件的美片。';
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-12">${msg}</p>`;
                paginationControls.classList.add('hidden');
                return;
            }

            // 2. ★ 分頁計算邏輯
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = 1; // 防呆

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, endIndex);

            // 3. ★ 更新分頁按鈕 UI
            paginationControls.classList.remove('hidden');
            const pageInput = document.getElementById('page-input');
            const totalText = document.getElementById('total-pages-text');
            
            if (pageInput && totalText) {
                pageInput.value = currentPage; // 更新輸入框數字
                pageInput.max = totalPages;    // 設定最大值防止亂輸
                totalText.textContent = `/ ${totalPages}`; // 更新總頁數文字
            }
            document.getElementById('prev-page-btn').disabled = currentPage === 1;
            document.getElementById('next-page-btn').disabled = currentPage === totalPages;

            // 4. 渲染卡片 (只渲染這一頁的 30 筆)
            grid.innerHTML = paginatedItems.map(c => {
                const displayName = c.nickname || '匿名';
                const fullLocation = [c.country, c.region, c.area].filter(Boolean).join(' · ');
                const tagsHtml = (c.tags||[]).map(t => `<span class="text-[10px] bg-gray-700 text-gray-300 px-2 py-0.5 rounded-full mr-1 mb-1 inline-block border border-gray-600">#${t}</span>`).join('');
                
                const isOwner = (myIpFingerprint && c.ip_fingerprint === myIpFingerprint) || 
                                (c.friend_code === guestCode && c.nickname === guestNick);
                
                const canEdit = isOwner || isAdmin;
                const canDelete = isOwner || isAdmin;

                let controlsHtml = '';
                if (canEdit || canDelete) {
                    controlsHtml = `
                    <div class="absolute top-2 right-2 flex gap-1 bg-black/60 backdrop-blur-sm rounded-lg p-1 opacity-0 group-hover:opacity-100 transition duration-200 z-10">
                        ${canEdit ? `<button onclick="editCard(${c.id}, event)" class="text-gray-300 hover:text-white p-1.5 hover:bg-gray-700 rounded" title="編輯">✏️</button>` : ''}
                        ${canDelete ? `<button onclick="deleteCard(${c.id}, event)" class="text-red-400 hover:text-red-300 p-1.5 hover:bg-gray-700 rounded" title="刪除">🗑️</button>` : ''}
                    </div>`;
                }

                const heartIcon = c.isLiked ? '❤️' : '🤍';
                const heartClass = c.isLiked ? 'liked' : 'text-gray-500 hover:text-pink-400';
                const cardContainerClass = c.is_obsolete ? 'border-red-900/80' : '';
                const imgStyleClass = c.is_obsolete ? 'grayscale opacity-60 mix-blend-luminosity' : '';
                const obsoleteBadge = c.is_obsolete ? '<div class="absolute inset-0 flex items-center justify-center pointer-events-none z-20"><span class="bg-red-600/90 text-white px-4 py-1.5 rounded-full text-sm font-bold transform -rotate-12 border-2 border-red-400 shadow-[0_0_15px_rgba(220,38,38,0.5)]">已絕版</span></div>' : '';
                
                const isObsoleteView = activeTag === 'obsolete';
                const obsBtnTitle = isObsoleteView ? '恢復上架' : '回報絕版';
                let obsBtnHtml, obsBtnBaseClass;

                let sourceBadgeHtml = '';
                if (c.source === '巨大花') {
                    sourceBadgeHtml = '<span class="text-[10px] bg-rose-600/20 text-rose-300 border border-rose-500/30 rounded-full px-1.5 py-0.5 font-bold ml-1">🏵️ 巨大花</span>';
                } else if (c.source === '蘑菇') {
                    sourceBadgeHtml = '<span class="text-[10px] bg-amber-600/20 text-amber-300 border border-amber-500/30 rounded-full px-1.5 py-0.5 font-bold ml-1">🍄 蘑菇</span>';
                } else if (c.source === '探測器') {
                    sourceBadgeHtml = '<span class="text-[10px] bg-cyan-600/20 text-cyan-300 border border-cyan-500/30 rounded-full px-1.5 py-0.5 font-bold ml-1">📡 探測器</span>';
                }
                if (isObsoleteView) {
                    obsBtnHtml = `<div class="flex flex-col items-center justify-center leading-none pointer-events-none"><span class="text-xs">✅</span><span class="text-[9px] font-bold mt-1">上架</span></div>`;
                    obsBtnBaseClass = 'h-auto w-auto px-1.5 py-1 text-green-400 hover:text-green-300 bg-green-900/40 border-green-700/50 rounded-lg'; 
                } else {
                    obsBtnHtml = `<span class="text-sm filter drop-shadow-md pointer-events-none">🚫</span>`;
                    obsBtnBaseClass = 'w-7 h-7 rounded-full text-gray-500 hover:text-red-500 bg-gray-800/80';
                }

                return `
                    <div class="card-bg rounded-xl overflow-hidden relative group flex flex-col h-full ${cardContainerClass}">
                        <div class="aspect-video bg-gray-900 cursor-pointer relative overflow-hidden" onclick="openImageViewer('${c.image_url}')">
                            <img src="${getCdnUrl(c.image_url)}" loading="lazy" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-700 ease-in-out ${imgStyleClass}">
                            ${controlsHtml}
                            ${obsoleteBadge}
                        </div>
                        
                        <div class="p-3 flex flex-col flex-grow gap-2 bg-gray-900/50">
                            <div class="flex justify-between items-start">
                                <div class="flex-1 truncate pr-2" title="${displayName}">
                                    <span class="text-xs text-gray-500 font-normal mr-0.5">By</span>
                                    <span class="text-sm font-bold text-gray-200">${displayName}</span>
                                    ${sourceBadgeHtml}
                                </div>
                                <div class="flex items-center gap-2 flex-shrink-0">
                                    <button onclick="toggleObsolete(${c.id}, '${displayName}')" class="flex items-center justify-center border border-gray-700 ${obsBtnBaseClass} transition active:scale-90 backdrop-blur-sm" title="${obsBtnTitle}">
                                        ${obsBtnHtml}
                                    </button>
                                    <button onclick="toggleLike(${c.id}, this)" class="like-btn flex items-center gap-1 bg-gray-800/80 border border-gray-700 px-2 py-0.5 rounded-full ${heartClass} backdrop-blur-sm">
                                        <span class="icon text-sm">${heartIcon}</span><span class="count text-xs font-bold">${c.likes}</span>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="bg-gray-800/80 rounded p-1.5 flex justify-between items-center border border-gray-700">
                                <span class="text-xs font-mono text-gray-400 truncate mr-2 select-all">${c.coordinate || 'N/A'}</span>
                                <button onclick="copyText('${c.coordinate}')" class="text-xs text-green-400 hover:text-white font-bold">📋</button>
                            </div>

                            <div class="flex flex-wrap content-end">${tagsHtml}</div>

                            ${fullLocation ? `
                            <div class="mt-auto pt-2 border-t border-gray-700/50">
                                <p class="text-xs text-gray-400 flex items-center gap-1">
                                    <span class="text-violet-400">🌍</span> ${fullLocation}
                                </p>
                            </div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        // 切換頁碼函式
        window.changePage = (delta) => {
            currentPage += delta;
            renderGrid();
            // 切換頁面後，捲動到過濾器下方
            document.getElementById('filter-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };


        // 跳轉頁面函式
        window.jumpToPage = (val) => {
            // 取得目前的篩選結果總數來計算最大頁數 (需要重新跑一次篩選邏輯來確認範圍)
            // 為了簡化，我們直接用 renderGrid 裡面的邏輯，或者將 totalPages 設為全域變數
            // 這裡使用一個簡單的防呆技巧：直接讀取 DOM 上的 max 屬性 (因為 renderGrid 已經設定過了)
            const input = document.getElementById('page-input');
            const maxPage = parseInt(input.max) || 1;
            let target = parseInt(val);

            if (isNaN(target) || target < 1) target = 1;
            if (target > maxPage) target = maxPage;

            currentPage = target;
            renderGrid();
            
            // 跳轉後回到頂部
            document.getElementById('filter-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };


        // Actions
        const modal = document.getElementById('postcard-modal');
        const form = document.getElementById('postcard-form');

        document.getElementById('add-postcard-btn').onclick = () => {
            form.reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').textContent = '分享美片';
            document.getElementById('image-upload-section').classList.remove('hidden');
            document.getElementById('preview-section').classList.add('hidden');
            document.getElementById('submit-btn').textContent = '發布';
            window.selectSource('');
            modal.classList.remove('hidden');
        };

        document.getElementById('close-modal-x').onclick = () => modal.classList.add('hidden');
        document.getElementById('close-modal-btn').onclick = () => modal.classList.add('hidden');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.textContent;
            
            // 鎖定按鈕避免重複提交
            btn.disabled = true; 
            btn.textContent = '處理中...';

            // 用來追蹤剛剛上傳的檔案名稱 (以便失敗時刪除)
            let uploadedFileName = null;

            try {
                // 身分判定邏輯 (修正版：自動拆解內部帳號)
                const currentGuestNick = localStorage.getItem('guest_nick');
                const currentGuestCode = localStorage.getItem('guest_code');
                
                let finalNickname = null;
                let finalFriendCode = null;

                // (2) & (3) 優先使用訪客身分 (若有設定完整的訪客資料，優先使用)
                if (currentGuestNick && currentGuestCode) {
                    finalNickname = currentGuestNick;
                    finalFriendCode = currentGuestCode;
                } 
                // (1) 使用內部會員身分
                else if (currentUser) {
                    const rawNick = currentUser.nickname || '';

                    // 偵測並拆解「暱稱+12碼數字」格式
                    // Regex 說明：
                    // ^(.*?)   -> 抓取前方所有字元 (包含圖示 Emoji)
                    // \s* -> 容許中間有空白 (選用)
                    // (\d{12})$ -> 抓取結尾的 12 位數字
                    const match = rawNick.match(/^(.*?)[\s]*(\d{12})$/);

                    if (match) {
                        // 命中！例如 "Miffy🐤134232970460"
                        finalNickname = match[1]; // 取出 "Miffy🐤"
                        finalFriendCode = match[2]; // 取出 "134232970460"
                    } else {
                        // 未命中 (例如純文字暱稱 "小明")
                        // 使用原暱稱，並給予一組預設的全 0 好友碼以通過資料庫驗證
                        finalNickname = rawNick;
                        finalFriendCode = '000000000000'; 
                    }
                }
                else {
                    throw new Error('請先登入會員，或前往大廳設定訪客身分後再發布。');
                }

                const id = document.getElementById('edit-id').value;
                const fileInput = document.getElementById('image-upload');
                let imageUrl = null;
                
                // --- 監聽座標輸入框 (格式化 + 自動反查) ---
                const coordInput = document.getElementById('coordinate-input');
                // (保留原本的座標監聽代碼，此處省略以節省篇幅，不需要修改) 

                // 2. 圖片上傳 (如果有的話)
                // 邏輯：如果是新增(無id)或編輯且有選檔，才上傳
                if (!id || (id && fileInput.files.length > 0)) {
                    if (fileInput.files.length === 0 && !id) throw new Error('請選擇圖片'); // 新增時必填
                    
                    if (fileInput.files.length > 0) {
                        const compressed = await compressImage(fileInput.files[0]);
                        
                        // 產生檔名並記錄在 uploadedFileName
                        uploadedFileName = `guest_art_${Date.now()}_${Math.floor(Math.random()*1000)}.jpg`;
                        
                        const { error: upErr } = await supabaseClient.storage.from('guest-postcard-images').upload(uploadedFileName, compressed);
                        if (upErr) throw upErr;
                        
                        const { data } = supabaseClient.storage.from('guest-postcard-images').getPublicUrl(uploadedFileName);
                        imageUrl = data.publicUrl;
                    }
                }

                // 3. 準備 Payload (使用判定後的 finalNickname 與 finalFriendCode)
                const payload = {
                    nickname: finalNickname,      // ★ 使用判定後的暱稱
                    friendCode: finalFriendCode,  // ★ 使用判定後的好友碼
                    coordinate: coordInput.value,
                    country: document.getElementById('input-country').value,
                    region: document.getElementById('input-region').value,
                    area: document.getElementById('input-area').value,
                    tags: [1,2,3].map(i=>document.getElementById(`tag-${i}`).value.trim()).filter(Boolean),
                    source: document.getElementById('input-source').value,
                    imageUrl: imageUrl, // 如果是編輯且沒換圖，這裡是 null，後端會忽略
                    id: id
                };

                // 4. 呼叫後端 API
                const action = id ? 'edit-guest-postcard' : 'add-guest-postcard';
                const { data, error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action, payload })
                });

                // 5. 檢查系統錯誤 (500 等)
                if (error) throw new Error(error.message);

                // 6. 檢查業務邏輯錯誤 (例如：座標重複)
                if (data && data.success === false) {
                    throw new Error(data.message || '操作被拒絕'); 
                }

                if (data && data.error) throw new Error(data.error);

                // --- 成功區 ---
                showToast(id ? '更新成功' : '發布成功', false);
                modal.classList.add('hidden');
                loadCards();

            } catch (err) {
                console.error('Submit Error:', err);
                showToast(`失敗：${err.message}`, true);

                // 回滾機制
                if (uploadedFileName) {
                    console.log('執行回滾：刪除無效圖片', uploadedFileName);
                    supabaseClient.storage.from('guest-postcard-images').remove([uploadedFileName])
                        .then(({ error }) => {
                            if (error) console.error('圖片回滾刪除失敗:', error);
                        });
                }

            } finally {
                btn.disabled = false; 
                btn.textContent = originalText;
            }
        };const currentGuestNick = localStorage.g

        window.editCard = (id, e) => {
            e.stopPropagation();
            const c = allCards.find(x => x.id === id);
            if (!c) return;
            
            document.getElementById('edit-id').value = id;
            document.getElementById('modal-title').textContent = '編輯美片';
            
            // 填入既有資料
            document.getElementById('coordinate-input').value = c.coordinate;
            document.getElementById('input-country').value = c.country || '';
            document.getElementById('input-region').value = c.region || '';
            document.getElementById('input-area').value = c.area || '';
    
            // 回填來源
            if (c.source) {
                window.selectSource(c.source);
            } else {
                document.getElementById('input-source').value = '';
            }

            // 自我修復機制 (移植自美片圖書館)
            // 如果座標存在，但國家/地區是空的（代表是舊資料或上次沒存到），自動觸發反查
            const coordVal = c.coordinate;
            const countryVal = c.country;

            if (coordVal && !countryVal) {
                // 呼叫現有的 formatCoordinateString 確保格式正確
                const formatted = formatCoordinateString(coordVal); 
                const parts = formatted.split(',');
                
                if (parts.length === 2) {
                    // 稍微延遲一下讓 Modal 先打開，使用者才看得到「搜尋中...」的提示
                    setTimeout(() => {
                        autoFillLocation(parts[0].trim(), parts[1].trim());
                    }, 500);
                }
            }
            
            [1,2,3].forEach(i => document.getElementById(`tag-${i}`).value = c.tags[i-1] || '');
            
            document.getElementById('image-upload-section').querySelector('label').textContent = '更換圖片 (不換留空)';
            document.getElementById('image-upload').value = '';
            document.getElementById('preview-image').src = c.image_url;
            document.getElementById('preview-section').classList.remove('hidden');
            document.getElementById('submit-btn').textContent = '更新';
            modal.classList.remove('hidden');
        };

        window.deleteCard = async (id, e) => {
            e.stopPropagation();
            if (!confirm('確定刪除此美片？')) return;
            try {
                const { error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action: 'delete-guest-postcard', payload: { id, nickname: guestNick, friendCode: guestCode } })
                });
                if (error) throw error;
                showToast('已刪除', false);
                loadCards();
            } catch (err) {
                showToast('刪除失敗', true);
            }
        };

        window.toggleLike = async (id, btn) => {
            const c = allCards.find(x => x.id === id);
            if (!c) return;
            
            const wasLiked = c.isLiked;
            c.isLiked = !wasLiked;
            c.likes += (wasLiked ? -1 : 1);
            btn.innerHTML = `<span class="icon text-sm">${c.isLiked?'❤️':'🤍'}</span><span class="count text-xs font-bold">${c.likes}</span>`;
            btn.className = `like-btn flex items-center gap-1 bg-gray-800/50 px-2 py-0.5 rounded-full ${c.isLiked?'liked':'text-gray-500 hover:text-pink-400'}`;

            try {
                await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action: 'toggle-guest-postcard-like', payload: { postcardId: id } })
                });
            } catch(e) { console.error('Like failed'); }
        };

        // --- 綁定貼上按鈕事件 (修正版：貼上後主動觸發反查) ---
        document.getElementById('paste-coord-btn').onclick = async () => {
            try {
                const txt = await navigator.clipboard.readText();
                if (txt) {
                    const formatted = formatCoordinateString(txt);
                    const inputEl = document.getElementById('coordinate-input');
                    
                    // 1. 填入數值
                    inputEl.value = formatted;
                    
                    // 2. 視覺回饋
                    showToast('已讀取剪貼簿', false);
                    
                    // 3. ★ 重點修正：主動呼叫反查 (因為程式修改值不會觸發監聽器)
                    const parts = formatted.split(',');
                    if (parts.length === 2) {
                        // 讓使用者知道正在運作
                        const countryInput = document.getElementById('input-country');
                        if (countryInput) countryInput.placeholder = '🔍 解析中...';
                        
                        // 呼叫反查函式
                        await autoFillLocation(parts[0].trim(), parts[1].trim());
                    }
                } else {
                    alert('剪貼簿是空的');
                }
            } catch (e) {
                console.error(e);
                alert('無法讀取剪貼簿，請嘗試直接在輸入框按 Ctrl+V 貼上');
            }
        };
        
        window.openImageViewer = (url) => {
            document.getElementById('viewer-image').src = getCdnUrl(url);
            document.getElementById('image-viewer-modal').classList.remove('hidden');
        };
        window.closeImageViewer = () => document.getElementById('image-viewer-modal').classList.add('hidden');
        
        window.copyText = (t) => navigator.clipboard.writeText(t).then(() => showToast('已複製', false));
        
        function showToast(msg, isErr) {
            const el = document.getElementById('toast-message');
            el.textContent = (isErr ? '❌ ' : '✅ ') + msg;
            el.className = `fixed top-5 right-5 text-white py-3 px-6 rounded-xl shadow-2xl z-[70] font-bold ${isErr?'bg-red-600':'bg-green-600'} translate-y-0`;
            el.classList.remove('hidden');
            setTimeout(() => { el.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => el.classList.add('hidden'), 300); }, 3000);
        }

        function setupDropdown(inputId, dropdownId, getSet) {
            const input = document.getElementById(inputId), dd = document.getElementById(dropdownId);
            const render = () => {
                const opts = Array.from(getSet()).sort().filter(x => x.toLowerCase().includes(input.value.toLowerCase()));
                dd.innerHTML = opts.map(x => `<div class="dropdown-option">${x}</div>`).join('') || '<div class="p-2 text-gray-500 text-xs">無選項</div>';
                Array.from(dd.children).forEach(div => div.onclick = () => { input.value = div.textContent; dd.classList.remove('show'); });
            };
            input.onfocus = () => { render(); dd.classList.add('show'); };
            input.oninput = () => { render(); dd.classList.add('show'); };
            document.addEventListener('click', e => { if(!input.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('show'); });
        }
        
        function updateInputDropdowns() {
            setupDropdown('input-country', 'dropdown-country', () => uniqueCountries);
            setupDropdown('input-region', 'dropdown-region', () => uniqueRegions);
            setupDropdown('input-area', 'dropdown-area', () => uniqueAreas);
            const allTags = new Set(); allCards.forEach(c => c.tags && c.tags.forEach(t => allTags.add(t)));
            [1,2,3].forEach(i => setupDropdown(`tag-${i}`, `dropdown-${i}`, () => allTags));
        }
        function initDropdowns() { updateInputDropdowns(); }

        // Bind events
        const coordInput = document.getElementById('coordinate-input');
        if(coordInput) { 
            coordInput.addEventListener('blur', function() {
                this.value = formatCoordinateString(this.value);
            });
            coordInput.addEventListener('paste', function(e) {
                setTimeout(() => { this.value = formatCoordinateString(this.value); }, 10);
            });
        }
        document.addEventListener('DOMContentLoaded', init);

        window.toggleObsolete = async (id, uploaderName) => {
            const c = allCards.find(x => x.id === id);
            if (!c) return;

            // 防止點擊穿透 (如果按鈕在圖片上)
            if (event) event.stopPropagation();

            const isCurrentlyObsolete = c.is_obsolete;
            const actionText = isCurrentlyObsolete ? '恢復上架' : '回報絕版';
            
            const confirmMsg = isCurrentlyObsolete 
                ? `確定要將這張美片「${actionText}」嗎？`
                : `您確定要回報這張美片為「絕版/失效」嗎？\n\n回報後，卡片將會變灰並標示絕版。`;

            if (!confirm(confirmMsg)) return;

            try {
                // 1. 樂觀 UI 更新
                c.is_obsolete = !isCurrentlyObsolete;
                renderGrid(); 

                // 2. 呼叫後端
                const { data, error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ action: 'toggle-guest-postcard-obsolete', payload: { postcardId: id } })
                });

                if (error) throw error;
                if (data && data.error) throw new Error(data.error);

                showToast(data.data.message, false);

            } catch (e) {
                console.error(e);
                // 失敗回滾
                c.is_obsolete = isCurrentlyObsolete;
                renderGrid();
                showToast(`操作失敗: ${e.message}`, true);
            }
        };

        // ★ 工具函式：自動反查地理位置 (透過後端 Proxy)
        async function autoFillLocation(lat, lng) {
            const countryInput = document.getElementById('input-country');
            const regionInput = document.getElementById('input-region');
            const areaInput = document.getElementById('input-area');

            const originalPlaceholders = {
                country: countryInput.placeholder,
                region: regionInput.placeholder,
                area: areaInput.placeholder
            };
            
            countryInput.value = ''; countryInput.placeholder = '🔍 搜尋中...';
            regionInput.value = ''; regionInput.placeholder = '🔍 搜尋中...';
            areaInput.value = ''; areaInput.placeholder = '🔍 搜尋中...';

            try {
                // 呼叫後端 Edge Function (action: reverse-geocode 在 index.ts 已存在)
                const { data: resData, error } = await supabaseClient.functions.invoke('admin-actions', {
                    body: JSON.stringify({ 
                        action: 'reverse-geocode', 
                        payload: { lat, lng } 
                    })
                });

                if (error) throw error;

                const data = resData.data;

                if (data && data.address) {
                    const addr = data.address;

                    // 1. 國家
                    if (addr.country) countryInput.value = addr.country;

                    // 2. 地區 (自動修正 "臺" 為 "台")
                    const region = addr.city || addr.county || addr.state || '';
                    if (region) regionInput.value = region.replace(/臺/g, '台');

                    // 3. 細項
                    const area = addr.suburb || addr.district || addr.town || addr.village || addr.neighbourhood || '';
                    if (area) areaInput.value = area;
                    
                    // 閃爍綠框提示成功
                    [countryInput, regionInput, areaInput].forEach(el => {
                        if(el.value) {
                            el.classList.add('ring-2', 'ring-green-500');
                            setTimeout(() => el.classList.remove('ring-2', 'ring-green-500'), 1000);
                        }
                    });
                }
            } catch (e) {
                console.error('自動填寫位置失敗:', e);
                // 失敗時恢復原本的 placeholder
                countryInput.placeholder = originalPlaceholders.country;
                regionInput.placeholder = originalPlaceholders.region;
                areaInput.placeholder = originalPlaceholders.area;
            }
        }

        // 智慧返回功能：依據登入狀態決定去向
        function handleBack() {
            // currentUser 變數在 checkAdmin() 執行後會有值
            if (currentUser) {
                // 情境 2: 若是已登入會員 -> 回到後台 (Dashboard)
                window.location.href = 'dashboard.html';
            } else {
                // 情境 1: 若無登入資訊 (訪客) -> 回到大廳 (Guest)
                window.location.href = 'guest.html';
            }
        }
    </script>
